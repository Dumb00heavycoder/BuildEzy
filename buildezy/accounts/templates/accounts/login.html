<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BuildEzy</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'accounts/login.css' %}">
</head>
<body>

  <div class="grid-bg"></div>

 <!-- Glow orbs -->
 <!-- <div class="glow glow-1"></div>
  <div class="glow glow-2"></div> -->

  <nav>
    <a href="{% url 'home' %}" class="logo">build<span>ezy</span></a>
  </nav>

  <main class="auth-wrapper">
    <div class="auth-card">

      <!-- Card top accent line -->
       <div class="card-accent"></div>

      <div class="auth-header">
        <!--<div class="auth-icon">⚡</div> -->
        <h1>Welcome back</h1>
        <p class="auth-sub">Sign in to continue building</p>
      </div>

      {% if messages %}
        <div class="msg-box">
          {% for message in messages %}
            <p class="msg {{ message.tags }}">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <form method="POST" class="auth-form" id="login-form">
        {% csrf_token %}

        <div class="field-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <!-- <span class="input-icon"></span> -->
            <input
              type="text"
              id="username"
              name="username"
              placeholder=""
              autocomplete="username"
              required
            >
          </div>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <!-- <span class="input-icon"></span> -->
            <input
              type="password"
              id="password"
              name="password"
              placeholder=""
              autocomplete="current-password"
              required
            >
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          <span class="btn-text">Login</span>
          <span class="btn-arrow">→</span>
          <span class="btn-shine"></span>
        </button>
      </form>

      <p class="auth-footer-text">
        Don't have an account?
        <a href="{% url 'signup' %}" class="auth-link">Create one →</a>
      </p>

    </div>
  </main>

  <footer class="auth-footer">
    <p>© 2026 BuildEzy. All rights reserved.</p>
  </footer>

</body>
</html>
